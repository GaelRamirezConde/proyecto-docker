name: Construccion y Despliegue Docker

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar el código
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Arrancar prueba unitaria
      run: python -m unittest test_app.py

    - name: Configurar Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Comprobacion de compilacion con Docker Bake
      uses: docker/bake-action@v4
      with:
        targets: default
        push: false

    - name: Iniciar sesión en Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Construir y subir la imagen (Docker Build)
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ramirezgael030881/proyecto-achalay:latest